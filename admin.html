<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin Panel · Quiniela</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg: #0c0f14; --bg-card: #1b212c; --line: #2a3242; --grass: #1ed87f; --gold: #f5b942; --text: #eef1f5; }
  body { font-family: 'Rubik', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; }
  .container { max-width: 600px; margin: 0 auto; }
  .admin-card { background: var(--bg-card); border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .score-row { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
  input { width: 60px; padding: 10px; text-align: center; background: #0c0f14; border: 1px solid #333; color: white; border-radius: 5px; }
  button { background: var(--grass); border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; font-weight: bold; }
  .msg { font-size: 12px; margin-top: 10px; text-align: center; }
  .msg.ok { color: var(--grass); }
</style>
</head>
<body>

<div class="container">
  <h1>⚙️ CONTROL DE PARTIDOS</h1>
  <div id="match-list">Cargando partidos...</div>
</div>

<script src="matches-config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const db = getDatabase(initializeApp({ databaseURL: "https://submanhwa-apuestas-default-rtdb.firebaseio.com" }));
  window.uiStatuses = {};

  // Función de guardado con la corrección
  window.saveToFirebase = async function(matchId) {
    const home = Number(document.getElementById(`score-h-${matchId}`).value);
    const away = Number(document.getElementById(`score-a-${matchId}`).value);
    let status = window.uiStatuses[matchId] || "SCHEDULED";
    const finalStatus = (status === "FINISHED") ? "SI" : status;
    const msgEl = document.getElementById("msg-" + matchId);

    try {
      await set(ref(db, `scores/${matchId}`), { home, away, status: finalStatus, updatedAt: Date.now() });
      msgEl.className = "msg ok";
      msgEl.textContent = "¡Sincronizado! ✨";
      setTimeout(() => { if(msgEl) msgEl.textContent = ""; }, 2500);
    } catch(e) { alert("Error: " + e.message); }
  }

  // Inicialización original de partidos
  const listEl = document.getElementById("match-list");
  listEl.innerHTML = "";
  Object.keys(GROUPS).forEach(groupKey => {
    GROUPS[groupKey].forEach(match => {
      const card = document.createElement("div");
      card.className = "admin-card";
      card.innerHTML = `<h3>${match.home.name} vs ${match.away.name}</h3>
        <div class="score-row">
          <input type="number" id="score-h-${match.id}" value="0">
          <input type="number" id="score-a-${match.id}" value="0">
        </div>
        <button onclick="saveToFirebase('${match.id}')">Actualizar 🚀</button>
        <div class="msg" id="msg-${match.id}"></div>`;
      listEl.appendChild(card);
    });
  });
</script>
</body>
</html>
