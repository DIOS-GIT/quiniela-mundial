<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Control Panel · Quiniela</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg: #07090e; 
    --card: #111622; 
    --line: #222b3d; 
    --text: #eef1f5; 
    --text-dim: #718096;
    --gold: #f5b942; 
    --live: #1ed87f; 
    --pending: #e2e8f0; 
    --finished: #3182ce;
  }
  
  body { 
    font-family: 'Montserrat', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    padding: 20px 12px; 
    margin: 0;
  }
  
  .container { max-width: 550px; margin: 0 auto; }
  
  h1 { 
    font-family: 'Bebas Neue', sans-serif; 
    color: var(--gold); 
    letter-spacing: 2px; 
    text-align: center; 
    margin-bottom: 5px; 
    font-size: clamp(2rem, 8vw, 3rem);
    text-shadow: 0 0 15px rgba(245, 185, 66, 0.2);
  }
  
  .subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 24px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  /* Tarjetas de Administración */
  .admin-card { 
    background: var(--card); 
    border: 1px solid var(--line); 
    border-radius: 16px; 
    padding: 18px 14px; 
    margin-bottom: 18px; 
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }

  .admin-card.state-SCHEDULED { border-left: 5px solid #4a5568; }
  .admin-card.state-IN_PLAY { 
    border-left: 5px solid var(--live); 
    box-shadow: 0 0 20px rgba(30, 216, 127, 0.15);
    background: linear-gradient(135deg, #111622 0%, #0d1e16 100%);
  }
  .admin-card.state-FINISHED { 
    border-left: 5px solid var(--finished); 
    opacity: 0.65;
    background: linear-gradient(135deg, #111622 0%, #0c121c 100%);
  }
  
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 14px;
  }

  h3 { 
    margin: 0; 
    font-size: clamp(0.95rem, 4vw, 1.2rem);
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1.3;
  }
  
  .status-badge {
    font-size: 0.7rem;
    font-weight: 900;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .state-SCHEDULED .status-badge { background: #2d3748; color: var(--pending); }
  .state-IN_PLAY .status-badge { background: rgba(30, 216, 127, 0.2); color: var(--live); animation: pulse 2s infinite; }
  .state-FINISHED .status-badge { background: rgba(49, 130, 206, 0.2); color: var(--finished); }

  /* Selector de Estado */
  .status-btns { 
    display: grid; 
    grid-template-columns: repeat(3, 1fr); 
    gap: 6px; 
    margin-bottom: 16px; 
  }
  
  .status-btns button {
    border: 1px solid var(--line);
    background: #171e2e;
    color: var(--text-dim);
    padding: 12px 4px;
    font-size: 0.7rem;
    font-weight: 700;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    touch-action: manipulation;
  }
  
  .status-btns button:hover,
  .status-btns button:active { background: #1f293d; color: white; }

  .state-SCHEDULED .btn-active-SCHEDULED { background: #4a5568 !important; color: white !important; border-color: #718096; }
  .state-IN_PLAY .btn-active-IN_PLAY { background: var(--live) !important; color: #07090e !important; border-color: var(--live); font-weight: 900; }
  .state-FINISHED .btn-active-FINISHED { background: var(--finished) !important; color: white !important; border-color: var(--finished); }

  /* Marcador */
  .score-row { 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    background: #090d14;
    padding: 12px 10px;
    border-radius: 12px;
    border: 1px solid var(--line);
    margin-bottom: 12px;
    gap: 6px;
  }
  
  .input-group { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .input-group label { 
    font-size: 0.75rem; 
    font-weight: 700; 
    color: var(--text-dim); 
    overflow: hidden; 
    text-overflow: ellipsis; 
    white-space: nowrap;
    min-width: 0;
  }
  
  input[type="number"] { 
    width: 52px;
    min-width: 52px;
    padding: 10px 6px; 
    background: #171e2e; 
    border: 1px solid var(--line); 
    color: white; 
    font-size: 1.3rem; 
    font-weight: 900; 
    text-align: center; 
    border-radius: 10px;
    outline: none;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"]:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(245,185,66,0.2); }
  
  .score-vs { font-weight: 900; color: var(--text-dim); font-size: 0.85rem; flex-shrink: 0; }

  /* Botón Guardar */
  .btn-save { 
    width: 100%; 
    background: linear-gradient(135deg, #f5b942 0%, #dca334 100%); 
    color: #07090e; 
    border: none; 
    padding: 16px; 
    font-weight: 900; 
    font-size: 1rem; 
    border-radius: 12px; 
    cursor: pointer; 
    transition: all 0.2s; 
    text-transform: uppercase;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 12px rgba(245,185,66,0.2);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-save:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(245,185,66,0.15); }

  .msg { font-size: 0.85rem; font-weight: 700; text-align: center; margin-top: 10px; min-height: 20px; }
  .msg.ok { color: var(--live); }

  @keyframes pulse {
    0% { opacity: 0.6; }
    50% { opacity: 1; }
    100% { opacity: 0.6; }
  }

  /* Stepper táctil para los inputs numéricos en móvil */
  .stepper-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .stepper-btn {
    width: 52px;
    height: 30px;
    background: #1f293d;
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 1rem;
    font-weight: 900;
    border-radius: 8px;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stepper-btn:active { background: #2a3650; color: white; }

  @media (max-width: 480px) {
    body { padding: 16px 10px; }
    .admin-card { padding: 16px 12px; border-radius: 14px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>PANEL DE CONTROL</h1>
  <div class="subtitle">Gestión Interactiva de Partidos</div>
  <div id="match-list">Cargando la lista de partidos de la jornada...</div>
</div>

<script src="matches-config.js?v=2.5"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const db = getDatabase(initializeApp({ databaseURL: "https://submanhwa-apuestas-default-rtdb.firebaseio.com" }));
  
  window.uiStatuses = {};
  let currentFirebaseData = {};

  // Escuchamos en tiempo real para pintar las tarjetas con sus datos actuales
  onValue(ref(db, "scores"), (snapshot) => {
    currentFirebaseData = snapshot.val() || {};
    recompilarYRenderizar();
  });

  window.stepScore = (inputId, delta, matchId, homeName, awayName) => {
    const input = document.getElementById(inputId);
    if (!input) return;
    const current = input.value === "" ? 0 : Number(input.value);
    input.value = Math.max(0, current + delta);
    checkAdminEmpate(matchId, homeName, awayName);
  };

  window.setUIStatus = (matchId, status) => {
    window.uiStatuses[matchId] = status;
    const card = document.getElementById(`card-${matchId}`);
    if (card) {
      // Cambio inmediato de clases de color reactivas
      card.className = `admin-card state-${status}`;
      const badge = card.querySelector('.status-badge');
      if (status === 'SCHEDULED') badge.innerText = 'PENDIENTE';
      if (status === 'IN_PLAY') badge.innerText = 'EN VIVO';
      if (status === 'FINISHED') badge.innerText = 'FINALIZADO';
      
      // Actualizar botones activos
      card.querySelectorAll('.status-btns button').forEach(btn => {
        btn.className = btn.getAttribute('data-s') === status ? `btn-active-${status}` : '';
      });
    }
  };

  window.checkAdminEmpate = (matchId, homeName, awayName) => {
    const h = document.getElementById(`score-h-${matchId}`);
    const a = document.getElementById(`score-a-${matchId}`);
    const row = document.getElementById(`admin-pen-row-${matchId}`);
    if (!h || !a || !row) return;
    row.style.display = (h.value !== "" && a.value !== "" && Number(h.value) === Number(a.value)) ? "block" : "none";
  };

  window.selAdminPen = (matchId, side) => {
    const btnH = document.getElementById(`admin-pen-home-${matchId}`);
    const btnA = document.getElementById(`admin-pen-away-${matchId}`);
    if (!btnH || !btnA) return;
    [btnH, btnA].forEach(b => { b.style.background = "#171e2e"; b.style.borderColor = "var(--line)"; b.removeAttribute("data-selected"); });
    const sel = side === "home" ? btnH : btnA;
    sel.style.background = "rgba(245,185,66,0.15)";
    sel.style.borderColor = "var(--gold)";
    sel.setAttribute("data-selected", "true");
  };

  window.saveMatch = async (matchId) => {
    const home = document.getElementById("score-h-" + matchId).value;
    const away = document.getElementById("score-a-" + matchId).value;
    
    // Si la DB tiene "SI", tomamos FINISHED, sino revisamos la UI o por defecto SCHEDULED
    const dbStatus = currentFirebaseData[matchId] ? currentFirebaseData[matchId].status : "NO";
    const selectedStatus = window.uiStatuses[matchId] || (dbStatus === "SI" ? "FINISHED" : "SCHEDULED");
    const finalStatus = (selectedStatus === "FINISHED") ? "SI" : selectedStatus;
    
    const msgEl = document.getElementById("msg-" + matchId);
    
    const saveData = { 
      home: home === "" ? 0 : Number(home), 
      away: away === "" ? 0 : Number(away), 
      status: finalStatus, 
      updatedAt: Date.now() 
    };

    // Guardar ganador en penales si el resultado es empate
    if (Number(home) === Number(away)) {
      const btnH = document.getElementById(`admin-pen-home-${matchId}`);
      const btnA = document.getElementById(`admin-pen-away-${matchId}`);
      if (btnH && btnH.getAttribute("data-selected")) saveData.penalesGanador = "home";
      else if (btnA && btnA.getAttribute("data-selected")) saveData.penalesGanador = "away";
    }

    await set(ref(db, `scores/${matchId}`), saveData);
    
    msgEl.className = "msg ok"; 
    msgEl.textContent = "¡Estructura guardada exitosamente! ✨";
    setTimeout(() => { if(msgEl) msgEl.textContent = ""; }, 2500);
  };

  function recompilarYRenderizar() {
    if (typeof GROUPS === 'undefined') return;

    let totalMatches = [];
    
    // Aplanamos todos los partidos de la cartelera en un solo array plano
    Object.keys(GROUPS).forEach(g => {
      GROUPS[g].forEach(m => {
        const fbState = currentFirebaseData[m.id] || {};
        // Traducimos el 'SI' a FINISHED interno para la lógica visual
        let currentStatus = fbState.status === 'SI' ? 'FINISHED' : (fbState.status || 'SCHEDULED');
        
        // Conservar la selección temporal que haga el usuario en la UI antes de guardar
        if (window.uiStatuses[m.id]) {
          currentStatus = window.uiStatuses[m.id];
        }

        totalMatches.push({
          ...m,
          fbHome: fbState.home !== undefined ? fbState.home : "",
          fbAway: fbState.away !== undefined ? fbState.away : "",
          statusInterno: currentStatus
        });
      });
    });

    // 2. REORDENACIÓN INTELIGENTE: Petición #2 cumplida
    // Orden de prioridad: IN_PLAY (En vivo) primero -> SCHEDULED (Pendiente) segundo -> FINISHED (Finalizado) al fondo.
    totalMatches.sort((a, b) => {
      const prioridades = { 'IN_PLAY': 1, 'SCHEDULED': 2, 'FINISHED': 3 };
      return prioridades[a.statusInterno] - prioridades[b.statusInterno];
    });

    // Pintar HTML
    const listEl = document.getElementById("match-list");
    listEl.innerHTML = totalMatches.map(m => {
      const s = m.statusInterno;
      const displayStatusText = s === 'SCHEDULED' ? 'PENDIENTE' : (s === 'IN_PLAY' ? 'EN VIVO' : 'FINALIZADO');
      
      return `
        <div class="admin-card state-${s}" id="card-${m.id}">
          <div class="card-header">
            <h3>${m.home.name} vs ${m.away.name}</h3>
            <span class="status-badge">${displayStatusText}</span>
          </div>
          
          <div class="status-btns">
            <button class="${s === 'SCHEDULED' ? 'btn-active-SCHEDULED' : ''}" data-s="SCHEDULED" onclick="setUIStatus('${m.id}', 'SCHEDULED')">PENDIENTE</button>
            <button class="${s === 'IN_PLAY' ? 'btn-active-IN_PLAY' : ''}" data-s="IN_PLAY" onclick="setUIStatus('${m.id}', 'IN_PLAY')">EN VIVO</button>
            <button class="${s === 'FINISHED' ? 'btn-active-FINISHED' : ''}" data-s="FINISHED" onclick="setUIStatus('${m.id}', 'FINISHED')">FINALIZADO</button>
          </div>
          
          <div class="score-row">
            <div class="input-group">
              <label>${m.home.name}</label>
              <div class="stepper-wrap">
                <button class="stepper-btn" onclick="stepScore('score-h-${m.id}', 1, '${m.id}', '${m.home.name}', '${m.away.name}')">＋</button>
                <input type="number" id="score-h-${m.id}" value="${m.fbHome}" min="0" oninput="checkAdminEmpate('${m.id}', '${m.home.name}', '${m.away.name}')">
                <button class="stepper-btn" onclick="stepScore('score-h-${m.id}', -1, '${m.id}', '${m.home.name}', '${m.away.name}')">－</button>
              </div>
            </div>
            <div class="score-vs">VS</div>
            <div class="input-group" style="justify-content: flex-end;">
              <div class="stepper-wrap">
                <button class="stepper-btn" onclick="stepScore('score-a-${m.id}', 1, '${m.id}', '${m.home.name}', '${m.away.name}')">＋</button>
                <input type="number" id="score-a-${m.id}" value="${m.fbAway}" min="0" oninput="checkAdminEmpate('${m.id}', '${m.home.name}', '${m.away.name}')">
                <button class="stepper-btn" onclick="stepScore('score-a-${m.id}', -1, '${m.id}', '${m.home.name}', '${m.away.name}')">－</button>
              </div>
              <label style="text-align:right;">${m.away.name}</label>
            </div>
          </div>

          <div id="admin-pen-row-${m.id}" style="display:${(m.fbHome !== '' && m.fbAway !== '' && Number(m.fbHome) === Number(m.fbAway)) ? 'block' : 'none'}; margin-bottom:15px; background:#090d14; border:1px solid var(--gold); border-radius:12px; padding:14px;">
            <div style="font-size:0.8rem; font-weight:700; color:var(--gold); margin-bottom:10px;">⚡ EMPATE — ¿Quién ganó en penales?</div>
            <div style="display:flex; gap:8px;">
              <button type="button" id="admin-pen-home-${m.id}" onclick="selAdminPen('${m.id}', 'home')"
                style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--line); background:#171e2e; color:var(--text); font-weight:700; cursor:pointer; transition:all .2s;">
                ${m.home.name}
              </button>
              <button type="button" id="admin-pen-away-${m.id}" onclick="selAdminPen('${m.id}', 'away')"
                style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--line); background:#171e2e; color:var(--text); font-weight:700; cursor:pointer; transition:all .2s;">
                ${m.away.name}
              </button>
            </div>
          </div>
          
          <button class="btn-save" onclick="saveMatch('${m.id}')">💾 Actualizar Datos</button>
          <div id="msg-${m.id}" class="msg"></div>
        </div>
      `;
    }).join("");
  }
</script>
</body>
</html>
