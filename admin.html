<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel · Solo Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0c0f14;
    --bg-panel: #141922;
    --bg-card: #1b212c;
    --line: #2a3242;
    --grass: #1ed87f;
    --gold: #f5b942;
    --red: #ff5d5d;
    --text: #eef1f5;
    --text-dim: #8b96a8;
  }
  body { font-family: 'Rubik', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; }
  .container { max-width: 600px; margin: 0 auto; }
  h1 { font-family: 'Bebas Neue', sans-serif; color: var(--gold); letter-spacing: 2px; text-align: center; margin-bottom: 30px;}
  
  .login-box { background: var(--bg-card); border: 1px solid var(--line); padding: 30px; border-radius: 14px; text-align: center; }
  input { background: var(--bg-panel); border: 1px solid var(--line); color: #fff; padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 15px; text-align: center; }
  button { background: var(--grass); color: #000; border: none; padding: 12px 24px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; border-radius: 8px; cursor: pointer; width: 100%; }
  
  .admin-card { background: var(--bg-card); border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .admin-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #fff; margin-bottom: 12px; text-align: center; }
  .card-id { font-size: 11px; color: var(--text-dim); text-transform: uppercase; text-align: center; margin-bottom: 6px; }
  
  .score-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
  .score-row input { width: 70px; font-size: 24px; font-family: 'Bebas Neue', sans-serif; margin: 0; text-align: center; background: var(--bg-panel); border: 1px solid var(--line); color: #fff; border-radius: 6px; padding: 4px; }
  
  .status-row { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
  .status-btn { background: var(--bg-panel); border: 1px solid var(--line); color: var(--text-dim); padding: 6px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; }
  .status-btn.active { border-color: var(--grass); color: var(--grass); background: rgba(30,216,127,0.1); }
  .msg { font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
  .msg.ok { color: var(--grass); }
  .msg.err { color: var(--red); }
</style>
</head>
<body>

<div class="container">
  <h1>⚙️ PANEL DE CONTROL DIRECTO</h1>

  <div class="login-box" id="login-box">
    <input type="password" id="pin-input" placeholder="Introduce el PIN de acceso">
    <button onclick="verifyPin()">Ingresar</button>
    <p id="login-err" style="color: var(--red); font-size: 13px; margin-top: 10px;"></p>
  </div>

  <div id="panel-box" style="display: none;">
    <div id="match-list"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAuozPCi4zVFT0t65eqawTnoiBvaCSInCQ",
    authDomain: "submanhwa-apuestas.firebaseapp.com",
    projectId: "submanhwa-apuestas",
    storageBucket: "submanhwa-apuestas.firebasestorage.app",
    messagingSenderId: "197537057888",
    appId: "1:197537057888:web:48cd6427bd9184ba5e0705",
    databaseURL: "https://submanhwa-apuestas-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const ADMIN_PIN = "1234";
  window.currentStatuses = {};
  let globalBets = {};

  window.verifyPin = function() {
    if(document.getElementById("pin-input").value === ADMIN_PIN) {
      document.getElementById("login-box").style.display = "none";
      document.getElementById("panel-box").style.display = "block";
      
      // Primero leemos las apuestas para extraer nombres reales de equipos, luego cargamos los partidos
      onValue(ref(db, "bets"), betSnap => {
        globalBets = betSnap.exists() ? betSnap.val() : {};
        listenFirebaseMatches();
      });
    } else {
      document.getElementById("login-err").textContent = "PIN incorrecto.";
    }
  }

  function listenFirebaseMatches() {
    onValue(ref(db, "scores"), snap => {
      const listEl = document.getElementById("match-list");
      listEl.innerHTML = "";

      if(!snap.exists()){
        listEl.innerHTML = `<p style="text-align:center; color:var(--text-dim);">No hay partidos en 'scores'.</p>`;
        return;
      }

      const matchesData = snap.val();

      Object.keys(matchesData).forEach(matchId => {
        const match = matchesData[matchId];
        
        // Buscamos nombres legibles dentro del nodo de apuestas (ej: "Brasil" vs "Marruecos")
        let homeName = "Equipo Local";
        let awayName = "Equipo Visitante";
        
        if (globalBets[matchId]) {
          const firstBetKey = Object.keys(globalBets[matchId])[0];
          if (firstBetKey && globalBets[matchId][firstBetKey]) {
            homeName = globalBets[matchId][firstBetKey].home || homeName;
            awayName = globalBets[matchId][firstBetKey].away || awayName;
          }
        }

        if (!window.currentStatuses[matchId]) {
          window.currentStatuses[matchId] = match.status || "SCHEDULED";
        }

        const card = document.createElement("div");
        card.className = "admin-card";
        card.innerHTML = `
          <div class="card-id">ID: ${matchId}</div>
          <h3>${homeName} vs ${awayName}</h3>
          
          <div class="score-row">
            <input type="number" min="0" id="score-h-${matchId}" value="${match.home ?? 0}">
            <span style="color:var(--text-dim); font-weight:bold;">—</span>
            <input type="number" min="0" id="score-a-${matchId}" value="${match.away ?? 0}">
          </div>

          <div class="status-row">
            <button class="status-btn btn-${matchId}" data-s="SCHEDULED" onclick="setUIStatus('${matchId}','SCHEDULED')">Pendiente</button>
            <button class="status-btn btn-${matchId}" data-s="IN_PLAY" onclick="setUIStatus('${matchId}','IN_PLAY')">🔴 En Vivo</button>
            <button class="status-btn btn-${matchId}" data-s="PAUSED" onclick="setUIStatus('${matchId}','PAUSED')">⏸ Medio</button>
            <button class="status-btn btn-${matchId}" data-s="FINISHED" onclick="setUIStatus('${matchId}','FINISHED')">✅ Finalizado</button>
          </div>

          <button onclick="saveMatch('${matchId}')">Asentar Marcador Oficial 🚀</button>
          <div class="msg" id="msg-${matchId}"></div>
        `;
        listEl.appendChild(card);
        updateButtonVisuals(matchId, window.currentStatuses[matchId]);
      });
    });
  }

  window.setUIStatus = function(matchId, status) {
    window.currentStatuses[matchId] = status;
    updateButtonVisuals(matchId, status);
  }

  function updateButtonVisuals(matchId, status) {
    document.querySelectorAll(`.btn-${matchId}`).forEach(btn => {
      btn.classList.toggle("active", btn.getAttribute("data-s") === status);
    });
  }

  window.saveMatch = async function(matchId) {
    const homeScore = Number(document.getElementById(`score-h-${matchId}`).value);
    const awayScore = Number(document.getElementById(`score-a-${matchId}`).value);
    const status = window.currentStatuses[matchId] || "SCHEDULED";
    const msgEl = document.getElementById(`msg-${matchId}`);

    try {
      await set(ref(db, `scores/${matchId}/home`), homeScore);
      await set(ref(db, `scores/${matchId}/away`), awayScore);
      await set(ref(db, `scores/${matchId}/status`), status);
      await set(ref(db, `scores/${matchId}/updatedAt`), Date.now());

      msgEl.className = "msg ok";
      msgEl.textContent = "¡Marcador asentado con éxito! 🏆";
      setTimeout(() => { if(msgEl) msgEl.textContent = ""; }, 3000);
    } catch (e) {
      msgEl.className = "msg err";
      msgEl.textContent = "Error: " + e.message;
    }
  }
</script>
</body>
</html>
