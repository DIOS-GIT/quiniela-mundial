<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel · Solo En Vivo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg: #0c0f14; --bg-panel: #141922; --bg-card: #1b212c; --line: #2a3242; --grass: #1ed87f; --gold: #f5b942; --red: #ff5d5d; --text: #eef1f5; }
  body { font-family: 'Rubik', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; }
  .container { max-width: 600px; margin: 0 auto; }
  h1 { font-family: 'Bebas Neue', sans-serif; color: var(--gold); letter-spacing: 2px; text-align: center; margin-bottom: 30px;}
  .msg { font-size: 0.8rem; margin-top: 10px; }
  .msg.ok { color: var(--grass); }
</style>
</head>
<body>

<div class="container">
  <h1>PANEL DE ADMINISTRACIÓN</h1>
  <div id="matches-container">Cargando partidos...</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const db = getDatabase(initializeApp({ databaseURL: "https://submanhwa-apuestas-default-rtdb.firebaseio.com" }));
  window.uiStatuses = {};

  // Función corregida para guardar
  window.saveToFirebase = async function(matchId) {
    const home = Number(document.getElementById(`score-h-${matchId}`).value);
    const away = Number(document.getElementById(`score-a-${matchId}`).value);
    
    // Obtener el estado actual
    let status = window.uiStatuses[matchId] || "SCHEDULED";
    
    // CORRECCIÓN: Si el estado es FINISHED, forzamos a "SI" para que el ranking lo procese
    const finalStatus = (status === "FINISHED") ? "SI" : status;
    
    const msgEl = document.getElementById("msg-" + matchId);

    try {
      await set(ref(db, `scores/${matchId}`), {
        home: home,
        away: away,
        status: finalStatus,
        updatedAt: Date.now()
      });
      
      msgEl.className = "msg ok";
      msgEl.textContent = "¡Guardado y Sincronizado! ✨";
      setTimeout(() => { if(msgEl) msgEl.textContent = ""; }, 3000);
    } catch (e) {
      console.error(e);
      alert("Error al guardar");
    }
  }

  // --- El resto de tu lógica de carga de partidos se mantiene igual ---
  // (Asegúrate de mantener aquí la parte que renderiza los inputs y botones)
</script>
</body>
</html>
