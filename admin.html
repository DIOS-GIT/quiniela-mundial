<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel · Quiniela</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0c0f14;
    --bg-panel: #141922;
    --bg-card: #1b212c;
    --line: #2a3242;
    --grass: #1ed87f;
    --gold: #f5b942;
    --red: #ff5d5d;
    --text: #eef1f5;
    --text-dim: #8b96a8;
  }
  body {
    font-family: 'Rubik', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 40px 20px;
  }
  .container { max-width: 600px; margin: 0 auto; }
  h1 { font-family: 'Bebas Neue', sans-serif; color: var(--gold); letter-spacing: 2px; text-align: center; margin-bottom: 30px;}
  
  .tabs { display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid var(--line); margin-bottom: 25px; padding-bottom: 10px; }
  .tab-btn { background: none; border: none; color: var(--text-dim); font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; cursor: pointer; padding: 5px 10px; width: auto; }
  .tab-btn.active { color: var(--grass); border-bottom: 2px solid var(--grass); }

  .login-box {
    background: var(--bg-card);
    border: 1px solid var(--line);
    padding: 30px;
    border-radius: 14px;
    text-align: center;
  }
  input {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    color: #fff;
    padding: 12px;
    border-radius: 8px;
    font-size: 16px;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 15px;
    text-align: center;
  }
  button {
    background: var(--grass);
    color: #000;
    border: none;
    padding: 12px 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
  }
  
  .admin-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
  }
  .match-badge {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 10px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: bold;
    letter-spacing: 0.5px;
  }
  .badge-current { background: rgba(30,216,127,0.15); color: var(--grass); }
  .badge-history { background: rgba(245,185,66,0.15); color: var(--gold); }

  .group-lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; text-align: center; display: block; margin-bottom: 4px; }
  .admin-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #fff; margin-bottom: 15px; text-align: center; letter-spacing: 0.5px; }
  .score-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 18px; }
  .score-row input { width: 70px; font-size: 24px; font-family: 'Bebas Neue', sans-serif; margin: 0; text-align: center; background: var(--bg-panel); border: 1px solid var(--line); color: #fff; border-radius: 6px; padding: 4px; }
  
  .status-row { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
  .status-btn {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    color: var(--text-dim);
    padding: 6px 14px;
    font-size: 13px;
    border-radius: 6px;
    width: auto;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .status-btn.active {
    border-color: var(--grass);
    color: var(--grass);
    background: rgba(30,216,127,0.1);
  }
  .msg { font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
  .msg.ok { color: var(--grass); }
</style>
</head>
<body>

<div class="container">
  <h1>⚙️ PANEL DE ADMINISTRACIÓN</h1>

  <div class="login-box" id="login-box">
    <p style="margin-bottom: 15px; color: var(--text-dim);">Introduce el código PIN de acceso</p>
    <input type="password" id="pin-input" placeholder="••••">
    <button onclick="verifyPin()">Ingresar</button>
    <p id="login-err" style="color: var(--red); font-size: 13px; margin-top: 10px;"></p>
  </div>

  <div id="panel-box" style="display: none;">
    <div class="tabs">
      <button class="tab-btn active" id="tab-live" onclick="switchTab('live')">🔴 Transmisión en Vivo</button>
      <button class="tab-btn" id="tab-close" onclick="switchTab('close')">📜 Cierre de Ranking</button>
    </div>
    
    <div id="match-list"></div>
  </div>
</div>

<script src="matches-config.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue, query, limitToFirst, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAuozPCi4zVFT0t65eqawTnoiBvaCSInCQ",
    authDomain: "submanhwa-apuestas.firebaseapp.com",
    projectId: "submanhwa-apuestas",
    storageBucket: "submanhwa-apuestas.firebasestorage.app",
    messagingSenderId: "197537057888",
    appId: "1:197537057888:web:48cd6427bd9184ba5e0705",
    databaseURL: "https://submanhwa-apuestas-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const ADMIN_PIN = "1234";
  let currentTab = "live";
  let firebaseScores = {}; 

  const STATUSES = [
    { value: "SCHEDULED", label: "Pendiente" },
    { value: "IN_PLAY",   label: "🔴 En Vivo" },
    { value: "PAUSED",    label: "⏸ Medio Tiempo" },
    { value: "FINISHED",  label: "✅ Finalizado" }
  ];

  window.verifyPin = function() {
    const entered = document.getElementById("pin-input").value;
    if(entered === ADMIN_PIN) {
      document.getElementById("login-box").style.display = "none";
      document.getElementById("panel-box").style.display = "block";
      
      // 1. Escucha global e inmediata a 'scores' (La Verdad Absoluta)
      onValue(ref(db, "scores"), snap => {
        firebaseScores = snap.exists() ? snap.val() : {};
        buildAdminPanel();
      });
    } else {
      document.getElementById("login-err").textContent = "PIN incorrecto.";
    }
  }

  window.switchTab = function(tab) {
    currentTab = tab;
    document.getElementById("tab-live").classList.toggle("active", tab === "live");
    document.getElementById("tab-close").classList.toggle("active", tab === "close");
    buildAdminPanel();
  }

  async function buildAdminPanel() {
    const listEl = document.getElementById("match-list");
    listEl.innerHTML = "";

    // Mapeamos los partidos vigentes del archivo matches-config.js
    const knownMatches = {};
    if (typeof GROUPS !== 'undefined') {
      Object.keys(GROUPS).forEach(groupKey => {
        GROUPS[groupKey].forEach(m => {
          knownMatches[m.id] = {
            id: m.id,
            group: m.groupName || `Grupo ${groupKey}`,
            title: `${m.home.flag || ''} ${m.home.name} VS ${m.away.name} ${m.away.flag || ''}`,
            isLegacy: false
          };
        });
      });
    }

    // Unimos los IDs de Firebase con los locales para asegurar cobertura total sin omisiones
    const allUniqueIds = Array.from(new Set([...Object.keys(knownMatches), ...Object.keys(firebaseScores)]));
    
    // Convertimos a array y ordenamos cronológicamente por updatedAt de Firebase
    const sortedMatches = allUniqueIds.map(id => {
      return { id, data: firebaseScores[id] || { status: "SCHEDULED", updatedAt: 0 } };
    }).sort((a, b) => (b.data.updatedAt || 0) - (a.data.updatedAt || 0));

    let visibleCount = 0;

    for (const item of sortedMatches) {
      const matchId = item.id;
      const currentStatus = item.data.status || "SCHEDULED";

      // Filtro estricto de separación por pestañas
      if (currentTab === "live" && currentStatus === "FINISHED") continue;
      if (currentTab === "close" && currentStatus !== "FINISHED") continue;

      visibleCount++;

      // Contenedor temporal (Placeholder) para evitar parpadeos en renderizado
      const card = document.createElement("div");
      card.className = "admin-card";
      card.id = `card-${matchId}`;
      listEl.appendChild(card);

      // Si el partido está activo en el config JS, lo pintamos de inmediato de forma síncrona
      if (knownMatches[matchId]) {
        renderCardContents(matchId, knownMatches[matchId], item.data, currentStatus);
      } else {
        // Caso Historial: Recuperación inteligente usando limitToFirst(1) del nodo 'bets'
        try {
          const betsRef = query(ref(db, `bets/${matchId}`), limitToFirst(1));
          const betsSnap = await get(betsRef);
          
          let legacyData = {
            id: matchId,
            group: "Historial",
            title: `Partido Rescatado (ID: ${matchId})`,
            isLegacy: true
          };

          if (betsSnap.exists()) {
            const firstBetKey = Object.keys(betsSnap.val())[0];
            const sampleBet = betsSnap.val()[firstBetKey];
            legacyData.group = sampleBet.group ? `Fase Grupo ${sampleBet.group}` : "Fase Anterior";
            legacyData.title = `⚽ ${sampleBet.home} VS ${sampleBet.away}`;
          }

          renderCardContents(matchId, legacyData, item.data, currentStatus);
        } catch (err) {
          console.error("Error recuperando partido del historial:", err);
          renderCardContents(matchId, { id: matchId, group: "Error", title: `ID Partido: ${matchId}`, isLegacy: true }, item.data, currentStatus);
        }
      }
    }

    if (visibleCount === 0) {
      listEl.innerHTML = `<p style="text-align:center; color:var(--text-dim); padding: 40px;">No hay partidos en esta categoría por ahora.</p>`;
    }
  }

  function renderCardContents(matchId, info, fbData, currentStatus) {
    const card = document.getElementById(`card-${matchId}`);
    if (!card) return;

    const badgeClass = info.isLegacy ? "badge-history" : "badge-current";
    const badgeText = info.isLegacy ? "📜 Historial" : "⚡ Activo";

    card.innerHTML = `
      <span class="match-badge ${badgeClass}">${badgeText}</span>
      <span class="group-lbl">${info.group} · ID: ${matchId}</span>
      <h3>${info.title}</h3>
      <div class="score-row">
        <input type="number" min="0" id="score-h-${matchId}" value="${fbData?.home ?? 0}">
        <span style="color: var(--text-dim); font-weight: bold;">—</span>
        <input type="number" min="0" id="score-a-${matchId}" value="${fbData?.away ?? 0}">
      </div>
      <div class="status-row">
        ${STATUSES.map(s => `
          <button class="status-btn btn-${matchId}" data-m="${matchId}" data-s="${s.value}" onclick="setUIStatus('${matchId}','${s.value}')">
            ${s.label}
          </button>
        `).join("")}
      </div>
      <button style="background: var(--gold); font-weight: bold;" onclick="updateMatchFirebase('${matchId}')">Asentar Marcador Oficial 🚀</button>
      <div class="msg" id="msg-${matchId}"></div>
    `;

    setUIStatus(matchId, currentStatus);
  }

  window.setUIStatus = function(matchId, status) {
    document.querySelectorAll(`.btn-${matchId}`).forEach(btn => {
      btn.classList.toggle("active", btn.dataset.s === status);
    });
  }

  window.updateMatchFirebase = async function(matchId) {
    const home = Number(document.getElementById(`score-h-${matchId}`).value);
    const away = Number(document.getElementById(`score-a-${matchId}`).value);
    const activeBtn = document.querySelector(`.btn-${matchId}.active`);
    const status = activeBtn ? activeBtn.dataset.s : "SCHEDULED";
    const msgEl = document.getElementById("msg-" + matchId);

    try {
      await set(ref(db, `scores/${matchId}`), { home, away, status, updatedAt: Date.now() });
      msgEl.className = "msg ok";
      msgEl.textContent = "¡Marcador oficial asentado con éxito! 🚀";
      setTimeout(() => { if(msgEl) msgEl.textContent = ""; }, 3000);
    } catch(e) {
      msgEl.className = "msg";
      msgEl.style.color = "var(--red)";
      msgEl.textContent = "Error: " + e.message;
    }
  }
</script>
</body>
</html>
