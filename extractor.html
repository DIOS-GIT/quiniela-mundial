<script src="matches-config.js?v=2.5"></script>

<script type="module">
  import { initializeApp } from "[https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js](https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js)";
  import { getDatabase, ref, onValue } from "[https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js](https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js)";

  const db = getDatabase(initializeApp({ databaseURL: "[https://submanhwa-apuestas-default-rtdb.firebaseio.com](https://submanhwa-apuestas-default-rtdb.firebaseio.com)" }));
  let bets = {}, scores = {};

  // Escuchar base de datos en tiempo real
  onValue(ref(db, "scores"), (s) => { scores = s.val() || {}; cargarPartidosDelDia(); });
  onValue(ref(db, "bets"), (s) => { bets = s.val() || {}; cargarPartidosDelDia(); });

  // Carga únicamente los partidos configurados para hoy en matches-config.js
  function cargarPartidosDelDia() {
    const selector = document.getElementById("match-select");
    let opciones = '<option value="">-- Selecciona un Partido Abierto/Cerrado --</option>';
    
    if (typeof GROUPS === 'undefined') return;

    // Recorremos los grupos de la jornada actual mapeados en tu config
    Object.keys(GROUPS).forEach(groupKey => {
      GROUPS[groupKey].forEach(m => {
        const scoreMatch = scores[m.id] || {};
        const totalApuestas = bets[m.id] ? Object.keys(bets[m.id]).length : 0;
        
        // Se coloca marcador visual si ya está evaluado en Firebase
        const statusLabel = scoreMatch.status === 'SI' ? `[EVALUADO: ${scoreMatch.home}-${scoreMatch.away}]` : '[SIN EVALUAR]';
        opciones += `<option value="${m.id}">${m.groupName} | ${m.home.name} vs ${m.away.name} ${statusLabel} (${totalApuestas} apuestas)</option>`;
      });
    });
    
    selector.innerHTML = opciones;
  }

  window.procesarPartido = () => {
    const mId = document.getElementById("match-select").value;
    
    // Limpieza de campos si no hay selección
    if (!mId) {
      limpiarCampos();
      return;
    }
    
    const matchScore = scores[mId];
    const matchBets = bets[mId] || {};
    
    if (!matchScore || matchScore.status !== 'SI') {
      limpiarCampos();
      document.getElementById("list-exact").placeholder = "El partido seleccionado no ha sido evaluado en Firebase aún.";
      return;
    }

    const hR = Number(matchScore.home);
    const aR = Number(matchScore.away);
    
    let exactos = [];
    let tendencias = [];
    let perdedores = [];
    
    Object.values(matchBets).forEach(b => {
      if (!b.username) return;
      const nick = b.username.trim();
      const hB = Number(b.homeScore);
      const aB = Number(b.awayScore);
      
      // Regla de cálculo estricto
      if (hB === hR && aB === aR) {
        exactos.push(nick);
      } else if ((hB > aB && hR > aR) || (hB < aB && hR < aR) || (hB === aB && hR === aR)) {
        tendencias.push(nick);
      } else {
        perdedores.push(nick);
      }
    });

    // Inyección de los nombres ordenados verticalmente (uno por línea)
    inyectarDatos("list-exact", "count-exact", exactos);
    inyectarDatos("list-winner", "count-winner", tendencias);
    inyectarDatos("list-fail", "count-fail", perdedores);
  };

  function inyectarDatos(areaId, badgeId, lista) {
    document.getElementById(areaId).value = lista.join("\n");
    document.getElementById(badgeId).innerText = lista.length;
  }

  function limpiarCampos() {
    inyectarDatos("list-exact", "count-exact", []);
    inyectarDatos("list-winner", "count-winner", []);
    inyectarDatos("list-fail", "count-fail", []);
    document.getElementById("list-exact").placeholder = "Nicks en fila...";
  }

  window.copiarAlPortapapeles = (areaId, btn) => {
    const txtArea = document.getElementById(areaId);
    if (!txtArea.value) {
      alert("No hay nicks cargados en este cuadro para copiar.");
      return;
    }
    
    navigator.clipboard.writeText(txtArea.value).then(() => {
      const textoOriginal = btn.innerText;
      btn.innerText = "Copiado ✓";
      setTimeout(() => { btn.innerText = textoOriginal; }, 2000);
    });
  };
</script>
