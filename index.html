<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBMANHWA · Quiniela Mundial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0c0f14;
    --bg-panel: #141922;
    --bg-card: #1b212c;
    --line: #2a3242;
    --grass: #1ed87f;
    --gold: #f5b942;
    --red: #ff5d5d;
    --text: #eef1f5;
    --text-dim: #8b96a8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Rubik', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height:100vh;
    background-image:
      radial-gradient(circle at 10% 0%, rgba(30,216,127,0.08), transparent 40%),
      radial-gradient(circle at 90% 100%, rgba(245,185,66,0.06), transparent 40%);
  }

  /* HEADER */
  header{
    border-bottom: 1px solid var(--line);
    padding: 28px 20px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  header::before{
    content:"";
    position:absolute; inset:0;
    background: repeating-linear-gradient(135deg, transparent 0 40px, rgba(255,255,255,0.015) 40px 80px);
    pointer-events:none;
  }
  .brand{
    font-family:'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  h1{
    font-family:'Bebas Neue', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    letter-spacing: 2px;
    line-height:1.1;
  }
  h1 span{ color: var(--grass); }
  .subtitle{
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 8px;
  }

  /* CONTAINER */
  .container{
    max-width: 920px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* GROUP TABS */
  .groups{
    display:flex;
    gap: 8px;
    overflow-x:auto;
    margin-bottom: 24px;
    padding-bottom: 4px;
  }
  .group-tab{
    flex:0 0 auto;
    font-family:'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing:2px;
    padding: 10px 22px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--bg-panel);
    color: var(--text-dim);
    cursor:pointer;
    transition: all .15s ease;
    white-space:nowrap;
  }
  .group-tab.active{
    border-color: var(--grass);
    color: var(--grass);
    background: rgba(30,216,127,0.08);
  }
  .group-tab:hover{ color: var(--text); }

  /* MATCH CARD */
  .match{
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .match-meta{
    display:flex;
    justify-content:center;
    gap: 16px;
    font-size: 12px;
    color: var(--text-dim);
    text-transform:uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }
  .match-meta .live{ color: var(--gold); }

  .teams{
    display:grid;
    grid-template-columns: 1fr auto 1fr;
    align-items:center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .team{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 14px;
    text-align:center;
  }
  .team.away{
    flex-direction: row-reverse;
  }
  .team-info{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 4px;
  }
  .flag{
    font-size: 32px;
    line-height:1;
  }
  .team-name{
    font-family:'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
  }
  .vs{
    font-family:'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--text-dim);
  }

  .card-thumb{
    width: 200px;
    border-radius: 10px;
    border: 1px solid var(--line);
  }
  .card-label{
    font-size: 10px;
    text-transform:uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }

  /* BET FORM */
  .bet-form{
    border-top: 1px solid var(--line);
    padding-top: 16px;
  }
  .score-inputs{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .score-inputs input{
    width: 56px;
    height: 56px;
    text-align:center;
    font-family:'Bebas Neue', sans-serif;
    font-size: 28px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
  }
  .score-inputs input:focus{
    outline:none;
    border-color: var(--grass);
  }
  .score-sep{
    font-family:'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--text-dim);
  }

  .name-row{
    display:flex;
    gap: 10px;
  }
  .name-row input[type="text"]{
    flex:1;
    height: 44px;
    padding: 0 14px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
  }
  .name-row input[type="text"]:focus{
    outline:none;
    border-color: var(--grass);
  }
  .name-row input[type="text"]::placeholder{ color: var(--text-dim); }

  .
