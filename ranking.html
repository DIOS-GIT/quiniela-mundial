<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBMANHWA · Ranking Oficial</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0c0f14;
    --bg-panel: #141922;
    --bg-card: #1b212c;
    --line: #2a3242;
    --grass: #1ed87f;
    --gold: #f5b942;
    --text: #eef1f5;
    --text-dim: #8b96a8;
  }
  body{
    font-family:'Rubik', sans-serif; background: var(--bg); color: var(--text); padding: 20px;
  }
  .container{ max-width: 700px; margin: 0 auto; }
  h1{ font-family:'Bebas Neue', sans-serif; font-size: 42px; text-align: center; margin-bottom: 20px; }
  h1 span { color: var(--gold); }
  
  table { width: 100%; border-collapse: collapse; background: var(--bg-panel); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--line); }
  th { background: #1c2330; font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--text-dim); }
  .pts { color: var(--grass); font-weight: bold; font-size: 16px; }
</style>
</head>
<body>

<div class="container">
  <h1>🏆 RANKING <span>GENERAL</span></h1>
  <p style="text-align: center; margin-bottom: 20px; color: var(--text-dim);"><a href="index.html" style="color: var(--grass); text-decoration: none;">⬅ Volver a la Quiniela</a></p>
  
  <table>
    <thead>
      <tr>
        <th>Pos</th>
        <th>Usuario</th>
        <th>Plenos (3pt)</th>
        <th>Aciertos (1pt)</th>
        <th>Puntos Totales</th>
      </tr>
    </thead>
    <tbody id="ranking-table-body">
      <tr><td colspan="5" style="text-align:center; color: var(--text-dim);">Cargando posiciones en tiempo real...</td></tr>
    </tbody>
  </table>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAuozPCi4zVFT0t65eqawTnoiBvaCSInCQ",
    authDomain: "submanhwa-apuestas.firebaseapp.com",
    projectId: "submanhwa-apuestas",
    storageBucket: "submanhwa-apuestas.firebasestorage.app",
    messagingSenderId: "197537057888",
    appId: "1:197537057888:web:48cd6427bd9184ba5e0705",
    databaseURL: "https://submanhwa-apuestas-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let allBets = {};
  let allScores = {};

  // Escuchar nodo de Apuestas
  onValue(ref(db, "bets"), snap => {
    allBets = snap.exists() ? snap.val() : {};
    calculatePositions();
  });

  // Escuchar nodo central de partidos (scores)
  onValue(ref(db, "scores"), snap => {
    allScores = snap.exists() ? snap.val() : {};
    calculatePositions();
  });

  function calculatePositions() {
    const userScores = {};
    const tbody = document.getElementById("ranking-table-body");

    // Filtrar cuáles partidos están realmente marcados como FINISHED por el admin
    const finishedMatches = {};
    Object.keys(allScores).forEach(id => {
      if (allScores[id] && allScores[id].status === "FINISHED") {
        finishedMatches[id] = allScores[id];
      }
    });

    // Si no hay partidos cerrados en la DB, mostramos el mensaje limpio
    if (Object.keys(finishedMatches).length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--text-dim);">Esperando que finalice el primer partido para abrir el ranking.</td></tr>`;
      return;
    }

    // Procesar las matemáticas cruzando los partidos terminados con las apuestas registradas
    Object.keys(finishedMatches).forEach(matchId => {
      const matchResult = finishedMatches[matchId];
      const matchBets = allBets[matchId];

      if (matchBets) {
        Object.values(matchBets).forEach(bet => {
          const username = (bet.username || "").trim();
          if (!username) return;

          const userKey = username.toLowerCase();

          // Inicializamos al participante si no existía en el mapa
          if (!userScores[userKey]) {
            userScores[userKey] = { name: username, points: 0, exacts: 0, tendencies: 0 };
          }

          const bH = Number(bet.homeScore);
          const bA = Number(bet.awayScore);
          const rH = Number(matchResult.home);
          const rA = Number(matchResult.away);

          // REGLA 1: Pleno absoluto (3 Puntos)
          if (bH === rH && bA === rA) {
            userScores[userKey].points += 3;
            userScores[userKey].exacts += 1;
          } else {
            // REGLA 2: Acierto de Tendencia / Ganador o Empate (1 Punto)
            const betTrend = bH > bA ? 'W' : bH < bA ? 'L' : 'D';
            const resTrend = rH > rA ? 'W' : rH < rA ? 'L' : 'D';
            
            if (betTrend === resTrend) {
              userScores[userKey].points += 1;
              userScores[userKey].tendencies += 1;
            }
          }
        });
      });
    });

    // Ordenar participantes de mayor a menor puntuación (y por plenos en caso de empate)
    const sortedRanking = Object.values(userScores).sort((a, b) => b.points - a.points || b.exacts - a.exacts);

    tbody.innerHTML = "";
    if (sortedRanking.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--text-dim);">Ningún usuario apostó en los partidos finalizados.</td></tr>`;
      return;
    }

    // Pintar los resultados en la tabla de forma organizada
    sortedRanking.forEach((user, index) => {
      tbody.innerHTML += `
        <tr>
          <td>${index + 1}</td>
          <td><strong>${user.name}</strong></td>
          <td style="color:var(--gold);">🎯 ${user.exacts}</td>
          <td>⚽ ${user.tendencies}</td>
          <td class="pts">${user.points} pts</td>
        </tr>
      `;
    });
  }
</script>
</body>
</html>
