<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Oficial</title>
<style>
  /* ESTO ARREGLA QUE NO SE SALGA DE LA PANTALLA */
  * { box-sizing: border-box; }
  body { background: #0a0c10; color: white; font-family: 'Montserrat', sans-serif; margin: 0; padding: 15px; width: 100%; overflow-x: hidden; }
  .container { max-width: 500px; margin: 0 auto; width: 100%; }
</style>
</head>
<body>
<nav style="display: flex; justify-content: center; gap: 30px; margin-bottom: 20px;">
  <a href="index.html" style="color: #555; font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; text-decoration: none;">APUESTAS</a>
  <a href="ranking.html" style="color: #f5b942; font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; text-decoration: none;">RANKING</a>
</nav>

<div class="container">
<body>

<div class="container">
  <h1>CLASIFICACIÓN</h1>
  <div class="subtitle">Quiniela Oficial · Seguimiento en vivo</div>
  
  <div class="info-panel">
    <h3>📊 Sistema de Puntuación</h3>
    <div style="display:flex; justify-content: space-between;">
      <span>🎯 <b>Marcador Exacto</b>: 3 pts</span>
      <span>⚽ <b>Ganador/Empate</b>: 1 pt</span>
    </div>
  </div>

  <input type="text" id="search-bar" placeholder="🔍 Buscar nombre..." onkeyup="filtrar()">
  <div id="ranking-list">Cargando datos...</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const db = getDatabase(initializeApp({ databaseURL: "https://submanhwa-apuestas-default-rtdb.firebaseio.com" }));
  let cachedData = [];
  let bets = {}, scores = {};

  const process = () => {
    let users = {};
    Object.keys(bets).forEach(mId => {
      if (!scores[mId] || scores[mId].status !== 'SI') return;
      Object.values(bets[mId]).forEach(b => {
        if (!users[b.username]) users[b.username] = { pts: 0, games: [] };
        const hR = Number(scores[mId].home), aR = Number(scores[mId].away);
        const hB = Number(b.homeScore), aB = Number(b.awayScore);
        
        let p = (hB === hR && aB === aR) ? 3 : (((hB > aB && hR > aR) || (hB < aB && hR < aR) || (hB === aB && hR === aR)) ? 1 : 0);
        users[b.username].pts += p;
        users[b.username].games.push({ match: `${b.home} vs ${b.away}`, bet: `${hB}-${hB}`, off: `${hR}-${aR}`, p });
      });
    });
    cachedData = Object.entries(users).sort((a,b) => b[1].pts - a[1].pts);
    render(cachedData);
  };

  onValue(ref(db, "bets"), (s) => { bets = s.val() || {}; process(); });
  onValue(ref(db, "scores"), (s) => { scores = s.val() || {}; process(); });

  window.render = (data) => {
    document.getElementById("ranking-list").innerHTML = data.map(([n, d], i) => `
      <div class="rank-row" onclick="this.querySelector('.details').style.display = this.querySelector('.details').style.display === 'block' ? 'none' : 'block'">
        <div class="header-row">
          <div class="name-block"><span style="color:#f5b942">#${i+1}</span> ${n.toUpperCase()}</div>
          <div class="pts-block">${d.pts}</div>
        </div>
        <div class="details">
          ${d.games.map(g => `<div class="bet-item">
            <span>${g.match}</span>
            <span>${g.bet} vs ${g.off} <span class="pts-badge">+${g.p} pts</span></span>
          </div>`).join('')}
        </div>
      </div>
    `).join("");
  };

  window.filtrar = () => {
    const t = document.getElementById("search-bar").value.toLowerCase();
    render(cachedData.filter(([n]) => n.toLowerCase().includes(t)));
  };
</script>
</body>
</html>
