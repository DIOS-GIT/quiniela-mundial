<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tabla de Posiciones</title>
<style>
  body { background: #0c0f14; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
  .rank-row { background: #1b212c; padding: 15px; margin: 10px auto; max-width: 500px; border-radius: 8px; display: flex; justify-content: space-between; }
</style>
</head>
<body>
<h1>🏆 TABLA DE POSICIONES</h1>
<div id="ranking-list">Esperando actualización del administrador...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const db = getDatabase(initializeApp({ databaseURL: "https://submanhwa-apuestas-default-rtdb.firebaseio.com" }));

  // Cada vez que cambie 'lastUpdate', el ranking se recalcula solo
  onValue(ref(db, "lastUpdate"), async () => {
    const list = document.getElementById("ranking-list");
    list.innerHTML = "Actualizando...";
    
    // Traemos toda la base de datos de una vez
    import { get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    const snap = await get(ref(db));
    const data = snap.val();
    const scores = data.scores || {};
    const bets = data.bets || {};
    let users = {};

    Object.keys(bets).forEach(mId => {
      if (!scores[mId] || scores[mId].status !== 'FINISHED') return;
      Object.values(bets[mId]).forEach(b => {
        if (!users[b.username]) users[b.username] = 0;
        if (b.homeScore == scores[mId].home && b.awayScore == scores[mId].away) users[b.username] += 3;
        else if ((b.homeScore > b.awayScore && scores[mId].home > scores[mId].away) || 
                 (b.homeScore < b.awayScore && scores[mId].home < scores[mId].away)) users[b.username] += 1;
      });
    });

    list.innerHTML = Object.entries(users).sort((a,b) => b[1] - a[1])
      .map(([u, p]) => `<div class="rank-row"><span>${u}</span><span>${p} pts</span></div>`).join("");
  });
</script>
</body>
</html>
