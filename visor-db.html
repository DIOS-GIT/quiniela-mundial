<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAuozPCi4zVFT0t65eqawTnoiBvaCSInCQ",
    authDomain: "submanhwa-apuestas.firebaseapp.com",
    projectId: "submanhwa-apuestas",
    storageBucket: "submanhwa-apuestas.firebasestorage.app",
    messagingSenderId: "197537057888",
    appId: "1:197537057888:web:48cd6427bd9184ba5e0705",
    databaseURL: "https://submanhwa-apuestas-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const loadingEl = document.getElementById("loading-msg");

  let betsData = null;
  let scoresData = null;

  // Renderizador unificado que cruza la info cuando ambos nodos responden
  function renderData() {
    if (!betsData || !scoresData) return; // Esperamos a que ambos tengan datos

    const matchIds = Object.keys(betsData);
    let total = matchIds.length;
    let withScore = 0;
    let pendingScore = 0;

    const processedMatches = {};
    const tableBody = document.getElementById("table-body");
    tableBody.innerHTML = "";

    if (total === 0) {
      loadingEl.textContent = "No hay apuestas registradas todavía.";
      return;
    }

    matchIds.forEach(matchId => {
      const matchBets = betsData[matchId];
      const matchScore = scoresData[matchId];

      let homeName = "Local";
      let awayName = "Visitante";
      let groupName = "Fase General";

      if (matchBets) {
        const firstBetKey = Object.keys(matchBets)[0];
        const sample = matchBets[firstBetKey];
        if (sample) {
          homeName = sample.home || homeName;
          awayName = sample.away || awayName;
          groupName = sample.group ? `Grupo ${sample.group}` : groupName;
        }
      }

      const hasScore = matchScore !== undefined;
      if (hasScore) withScore++;
      else pendingScore++;

      const homeGoals = hasScore ? (matchScore.home ?? 0) : "—";
      const awayGoals = hasScore ? (matchScore.away ?? 0) : "—";
      const currentStatus = hasScore ? (matchScore.status || "FINISHED") : "SCHEDULED";

      processedMatches[matchId] = {
        matchId,
        title: `⚽ ${homeName} vs ${awayName}`,
        group: groupName,
        homeScore: hasScore ? Number(matchScore.home) : null,
        awayScore: hasScore ? Number(matchScore.away) : null,
        status: currentStatus
      };

      const statusBadge = hasScore
        ? `<span class="badge badge-finished">Asentado ✅</span>`
        : `<span class="badge badge-scheduled">No Asentado</span>`;

      const row = document.createElement("tr");
      row.innerHTML = `
        <td style="font-family: monospace; font-weight: bold; color: var(--gold);">${matchId}</td>
        <td>${groupName}</td>
        <td style="font-weight: 500;">⚽ ${homeName} vs ${awayName}</td>
        <td style="font-size: 16px; font-weight: bold; text-align: center; font-family: 'Bebas Neue', sans-serif;">${homeGoals} — ${awayGoals}</td>
        <td>${statusBadge}</td>
      `;
      tableBody.appendChild(row);
    });

    document.getElementById("stat-total").textContent = total;
    document.getElementById("stat-finished").textContent = withScore;
    document.getElementById("stat-active").textContent = pendingScore;

    loadingEl.style.display = "none";
    document.getElementById("db-table").style.display = "table";
    document.getElementById("json-output").textContent = JSON.stringify(processedMatches, null, 2);

    window.MundialAPI = { getScores: () => processedMatches, isReady: true };
  }

  // ✅ Escuchamos por separado en tiempo real para evitar el problema de permisos en la raíz
  onValue(ref(db, "bets"), (snapshot) => {
    betsData = snapshot.exists() ? snapshot.val() : {};
    renderData();
  }, (err) => {
    loadingEl.textContent = `Error en bets: ${err.message}`;
  });

  onValue(ref(db, "scores"), (snapshot) => {
    scoresData = snapshot.exists() ? snapshot.val() : {};
    renderData();
  }, (err) => {
    loadingEl.textContent = `Error en scores: ${err.message}`;
  });
</script>
