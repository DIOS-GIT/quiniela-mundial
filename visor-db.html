<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Maestro</title>
<style>
  body { background: #0c0f14; color: #eef1f5; font-family: 'Inter', sans-serif; padding: 20px; }
  .btn-master { background: #f5b942; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; margin-bottom: 20px; color: #000; }
  
  /* Tarjeta de Partido */
  .match-card { background: #141922; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a3242; }
  .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #2a3242; padding-bottom: 10px; }
  .match-title { font-size: 1.2em; font-weight: bold; color: #1ed87f; }
  
  /* Controles */
  .controls { display: flex; gap: 10px; align-items: center; }
  .btn-pub { background: #1ed87f; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; color: black; font-weight: bold; }
  .btn-no { background: #3a4456; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; color: white; }
  
  /* Grid de Apuestas */
  .bets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 10px; }
  .bet-item { background: #1b212c; padding: 8px; border-radius: 6px; text-align: center; font-size: 0.85em; border: 1px solid #2a3242; }
</style>
</head>
<body>

<h1>🛠️ PANEL DE CONTROL</h1>
<button class="btn-master" onclick="publicarRanking()">🚀 PUBLICAR CAMBIOS AL RANKING</button>

<div id="match-container"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const db = getDatabase(initializeApp({ databaseURL: "https://submanhwa-apuestas-default-rtdb.firebaseio.com" }));
  let bets = {}; let scores = {};

  onValue(ref(db, "bets"), (snap) => { bets = snap.val() || {}; render(); });
  onValue(ref(db, "scores"), (snap) => { scores = snap.val() || {}; render(); });

  window.togglePublicar = (id, status) => { update(ref(db, `scores/${id}`), { status: status }); };
  window.publicarRanking = () => { set(ref(db, "lastUpdate"), Date.now()).then(() => alert("Ranking Actualizado!")); };

  function render() {
    const container = document.getElementById("match-container");
    container.innerHTML = "";
    Object.keys(bets).forEach(id => {
      const s = scores[id] || { home: 0, away: 0, status: 'NO' };
      const b = Object.values(bets[id])[0];
      
      const card = document.createElement("div");
      card.className = "match-card";
      card.innerHTML = `
        <div class="match-header">
          <div class="match-title">${id} | ${b.home} vs ${b.away}</div>
          <div class="controls">
            <input type="number" id="h-${id}" value="${s.home}" style="width:30px"> - 
            <input type="number" id="a-${id}" value="${s.away}" style="width:30px">
            <button onclick="guardarScore('${id}')">💾</button>
            <button class="${s.status === 'SI' ? 'btn-pub' : 'btn-no'}" onclick="togglePublicar('${id}', 'SI')">SÍ</button>
            <button class="${s.status === 'SI' ? 'btn-no' : 'btn-pub'}" onclick="togglePublicar('${id}', 'NO')">NO</button>
          </div>
        </div>
        <div class="bets-grid" id="bets-${id}"></div>
      `;
      container.appendChild(card);
      
      const betContainer = document.getElementById(`bets-${id}`);
      Object.values(bets[id]).forEach(bet => {
        betContainer.innerHTML += `<div class="bet-item"><b>${bet.username}</b><br>${bet.homeScore}-${bet.awayScore}</div>`;
      });
    });
  }

  window.guardarScore = (id) => {
    update(ref(db, `scores/${id}`), { home: Number(document.getElementById(`h-${id}`).value), away: Number(document.getElementById(`a-${id}`).value) });
  };
</script>
</body>
</html>
