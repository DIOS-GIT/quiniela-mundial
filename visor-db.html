<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAuozPCi4zVFT0t65eqawTnoiBvaCSInCQ",
    authDomain: "submanhwa-apuestas.firebaseapp.com",
    projectId: "submanhwa-apuestas",
    storageBucket: "submanhwa-apuestas.firebasestorage.app",
    messagingSenderId: "197537057888",
    appId: "1:197537057888:web:48cd6427bd9184ba5e0705",
    databaseURL: "https://submanhwa-apuestas-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const loadingEl = document.getElementById("loading-msg");

  // Estado local para combinar datos
  let cache = { bets: {}, scores: {} };

  function procesarDatos() {
    console.log("Procesando datos combinados...", cache);
    const matchIds = Object.keys(cache.bets);
    const tableBody = document.getElementById("table-body");
    tableBody.innerHTML = "";

    matchIds.forEach(id => {
      const score = cache.scores[id] || { home: 0, away: 0, status: 'PENDING' };
      const row = document.createElement("tr");
      row.innerHTML = `
        <td style="color:var(--gold)">${id}</td>
        <td>${score.home} - ${score.away}</td>
        <td>${score.status}</td>
      `;
      tableBody.appendChild(row);
    });
    
    document.getElementById("db-table").style.display = "table";
    loadingEl.style.display = "none";
  }

  // Escuchar Bets
  onValue(ref(db, "bets"), (snap) => {
    cache.bets = snap.val() || {};
    procesarDatos();
  });

  // Escuchar Scores
  onValue(ref(db, "scores"), (snap) => {
    cache.scores = snap.val() || {};
    procesarDatos();
  });
</script>
