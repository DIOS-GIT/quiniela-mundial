<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Control y Ranking</title>
<style>
  body { background: #0c0f14; color: #fff; font-family: sans-serif; padding: 20px; }
  .panel { background: #141922; padding: 20px; border-radius: 10px; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  td { padding: 10px; border-bottom: 1px solid #2a3242; }
  .score-input { width: 50px; background: #1b212c; border: 1px solid #2a3242; color: white; padding: 5px; text-align: center; }
  .btn-save { background: #1ed87f; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
  .btn-rank { background: #f5b942; border: none; padding: 15px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="panel">
  <h1>⚙️ PANEL DE CONTROL</h1>
  <button class="btn-rank" onclick="triggerRankingUpdate()">🚀 ACTUALIZAR RANKING PARA USUARIOS</button>
  <table>
    <tbody id="table-body"></tbody>
  </table>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const db = getDatabase(initializeApp({ databaseURL: "https://submanhwa-apuestas-default-rtdb.firebaseio.com" }));
  let cache = { bets: {}, scores: {} };

  onValue(ref(db, "bets"), (snap) => { cache.bets = snap.val() || {}; render(); });
  onValue(ref(db, "scores"), (snap) => { cache.scores = snap.val() || {}; render(); });

  window.guardarMarcador = (id) => {
    const h = document.getElementById(`h-${id}`).value;
    const a = document.getElementById(`a-${id}`).value;
    set(ref(db, `scores/${id}`), { home: Number(h), away: Number(a), status: 'FINISHED', updatedAt: Date.now() })
    .then(() => alert("Marcador asentado"));
  };

  window.triggerRankingUpdate = () => {
    // Al presionar este botón, escribimos un timestamp en la base de datos. 
    // El ranking detectará este cambio y se refrescará solo.
    set(ref(db, "lastUpdate"), Date.now())
    .then(() => alert("¡Ranking actualizado para todos!"));
  };

  function render() {
    const body = document.getElementById("table-body");
    body.innerHTML = "";
    Object.keys(cache.bets).forEach(id => {
      const s = cache.scores[id] || { home: 0, away: 0 };
      const b = Object.values(cache.bets[id])[0];
      body.innerHTML += `<tr>
        <td>${id}</td><td>${b.home} vs ${b.away}</td>
        <td><input type="number" id="h-${id}" class="score-input" value="${s.home}"> 
            <input type="number" id="a-${id}" class="score-input" value="${s.away}"></td>
        <td><button class="btn-save" onclick="guardarMarcador('${id}')">Guardar</button></td>
      </tr>`;
    });
  }
</script>
</body>
</html>
